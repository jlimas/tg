name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - run: gofmt -l . | tee /tmp/fmt.out; test ! -s /tmp/fmt.out
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
